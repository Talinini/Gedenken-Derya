<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In Erinnerung an Derya Takmaz</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
color:#fff;
text-align:center;
}

/* Bild oben */
.hero-img{
width:100%;
max-height:500px;
object-fit:cover;
}

/* Text */
.hero-text{
padding:30px 20px;
background:#000;
}

h1{
font-size:26px;
font-weight:300;
line-height:1.5;
}

.dates{
margin-top:10px;
opacity:0.8;
}

/* Inhalt */
.content{
padding:30px 20px;
}

.text{
font-size:18px;
margin-bottom:10px;
}

.text-tr{
font-size:16px;
opacity:0.8;
margin-bottom:30px;
}

/* Playlist */
iframe{
width:100%;
max-width:900px;
height:400px;
border:none;
border-radius:12px;
margin-bottom:40px;
}

/* Gästebuch */
.guestbook{
max-width:600px;
margin:auto;
text-align:left;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
padding:10px;
width:100%;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.entry{
background:#1a1a1a;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>
</head>

<body>

<!-- ✅ BILD DIREKT -->
<img src="deryam.jpg" class="hero-img">

<div class="hero-text">

🕯️

<h1>
Derya Takmaz.<br>
Mama, Tochter, Schwester & die beste Freundin die man sich hätte vorstellen können.
</h1>

<div class="dates">
29.03.1985 – 01.12.∞
</div>

</div>

<div class="content">

<div class="text">
Diese Lieder erinnern uns an dich.
</div>

<div class="text-tr">
Hep bizimlesin. Hep seninleyiz. Seni çok seviyor ve özlüyoruz.
</div>

<iframe src="https://www.youtube.com/embed/videoseries?list=PLLc0pOYb3bGVwp-V3SKe5pe0AHnJnpan0&autoplay=1&mute=1" allowfullscreen></iframe>

<div class="guestbook">

<h2>Derya’ya söylemek istedikleriniz</h2>

<input type="text" id="name" placeholder="Dein Name">
<textarea id="message" placeholder="Deine Nachricht"></textarea>

<button onclick="addEntry()">Nachricht hinterlassen</button>

<div id="entries"></div>

</div>

</div>

<script>
function addEntry(){
let name = document.getElementById("name").value;
let message = document.getElementById("message").value;

if(name === "" || message === "") return;

let entry = document.createElement("div");
entry.className = "entry";
entry.innerHTML = "<strong>" + name + "</strong><br>" + message;

document.getElementById("entries").prepend(entry);

document.getElementById("name").value = "";
document.getElementById("message").value = "";
}
</script>

</body>
</html>
